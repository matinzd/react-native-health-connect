name: Release & Publish To NPM

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY_GITHUB_ACTIONS }}

      - name: Initialize The Github Actions Bot User
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'yarn'

      - name: Enable corepack
        run: corepack enable

      - name: Check if semantic release is needed
        id: should_release
        run: |
          if npx should-semantic-release; then
            echo "result=true" >> $GITHUB_OUTPUT
          else
            echo "result=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.should_release.outputs.result == 'true'
        run: yarn install --immutable

      - name: Publish to NPM using OIDC Trusted Publishing
        if: steps.should_release.outputs.result == 'true'
        run: yarn release --ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
